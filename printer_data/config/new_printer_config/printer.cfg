[respond]
#####################################################################
#   Happy Hare includes
#####################################################################
[include mmu/base/*.cfg]
[include mmu/addons/mmu_eject_buttons.cfg]

#####################################################################
#   File locations and on error handling
#####################################################################

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

 
#####################################################################
#   Printer mainboard and toolhead CAN ID's
#####################################################################
[mcu]
##	Spider v1
##	Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_38005C000751393038383735-if00
##--------------------------------------------------------------------

[mcu toolhead_mcu]
canbus_uuid=fbb962169897
canbus_interface: can0

[mcu rpi]
serial: /tmp/klipper_host_mcu

#####################################################################
#   Basic Klipper and Printer setup
#####################################################################

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 7000  	
max_z_velocity: 30
max_z_accel: 350	
square_corner_velocity: 5.0
#minimum_cruise_ratio: 0.1

[exclude_object]
[print_stats]

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 43200

[force_move]
enable_force_move: True


#####################################################################
#   Includes
#####################################################################

